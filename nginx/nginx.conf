events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # digiiplex.local → website
    server {
        listen 80;
        server_name digiiplex.local;

        location / {
            alias /usr/share/nginx/html/website/;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://digiplex_gateway:8080/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
        }
    }

    # superadmin.digiiplex.local → superadmin
    server {
        listen 80;
        server_name superadmin.digiiplex.local;

        location / {
            alias /usr/share/nginx/html/superadmin/;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://digiplex_gateway:8080/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
        }
    }

    # admin.digiiplex.local → admin
    server {
        listen 80;
        server_name admin.digiiplex.local;

        location / {
            alias /usr/share/nginx/html/admin/;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://digiplex_gateway:8080/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
        }
    }

    # creator.digiiplex.local → creator
    server {
        listen 80;
        server_name creator.digiiplex.local;

        location / {
            alias /usr/share/nginx/html/creator/;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://digiplex_gateway:8080/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
        }
    }
}